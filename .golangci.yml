version: "2"
linters:
  enable:
    - errcheck
    - gocritic
    - gosec
    - misspell
    - staticcheck
    - unused
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    gosec:
      excludes:
        - G115 # safe small-integer conversions (rune/byte)
        - G306 # 0o644 permissions acceptable for non-secret files
        - G404 # math/rand fine for non-crypto use (confetti animation)
        - G703 # path traversal false positive on trusted CLI input
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 3
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
