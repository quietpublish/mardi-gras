name: Bug Report
description: Report a bug in Mardi Gras
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `mg` in a project with Beads
        2. Press '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `mg --version`
      placeholder: "mg v0.12.1"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, terminal emulator, and shell"
      placeholder: "macOS 15.3, iTerm2, zsh"
    validations:
      required: true

  - type: dropdown
    id: gastown
    attributes:
      label: Gas Town active?
      options:
        - "No"
        - "Yes (gt on PATH)"
        - "Yes (inside Gas Town session)"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
